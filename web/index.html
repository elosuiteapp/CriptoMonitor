<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crypto Monitor — Cockpit do trader</title>
    <!-- Tipografia premium: Inter (interface) + JetBrains Mono (números/tabelas). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Aplica o tema antes do React montar (evita flash claro/escuro). Padrão: escuro. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("cm.theme");
          document.documentElement.classList.toggle("dark", t ? t === "dark" : true);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
